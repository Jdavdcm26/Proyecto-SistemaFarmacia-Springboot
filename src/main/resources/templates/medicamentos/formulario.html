<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Medicamento</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">FarmaSystem</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link text-white" href="/categorias">Categorías</a>
            <a class="nav-link text-white" href="/proveedores">Proveedores</a>
            <a class="nav-link text-white" href="/medicamentos">Medicamentos</a>
            <a class="nav-link text-white" href="/clientes">Clientes</a>
            <a class="nav-link text-white" href="/ventas">Ventas</a>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <div class="card shadow-sm" style="max-width: 700px; margin: auto;">
        <div class="card-header bg-success text-white">
            <h5 class="mb-0"><i class="bi bi-capsule"></i>
                <span th:text="${medicamento.codigo != null and !medicamento.codigo.isEmpty()} ? 'Editar Medicamento' : 'Nuevo Medicamento'"></span>
            </h5>
        </div>
        <div class="card-body">
            <form th:action="@{/medicamentos/guardar}" th:object="${medicamento}" method="post">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Código</label>
                        <input type="text" th:class="${#fields.hasErrors('codigo')} ? 'form-control is-invalid' : 'form-control'"
                               th:field="*{codigo}" placeholder="Ej: MED001"/>
                        <div class="invalid-feedback" th:errors="*{codigo}"></div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Nombre</label>
                        <input type="text" th:class="${#fields.hasErrors('nombre')} ? 'form-control is-invalid' : 'form-control'"
                               th:field="*{nombre}" placeholder="Nombre del medicamento"/>
                        <div class="invalid-feedback" th:errors="*{nombre}"></div>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Descripción</label>
                    <textarea class="form-control" th:field="*{descripcion}" rows="2"
                              placeholder="Descripción opcional"></textarea>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Precio de compra</label>
                        <input type="number" step="0.01"
                               th:class="${#fields.hasErrors('precioCompra')} ? 'form-control is-invalid' : 'form-control'"
                               th:field="*{precioCompra}"/>
                        <div class="invalid-feedback" th:errors="*{precioCompra}"></div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Precio de venta</label>
                        <input type="number" step="0.01"
                               th:class="${#fields.hasErrors('precioVenta')} ? 'form-control is-invalid' : 'form-control'"
                               th:field="*{precioVenta}"/>
                        <div class="invalid-feedback" th:errors="*{precioVenta}"></div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-semibold">Stock actual</label>
                        <input type="number"
                               th:class="${#fields.hasErrors('stock')} ? 'form-control is-invalid' : 'form-control'"
                               th:field="*{stock}"/>
                        <div class="invalid-feedback" th:errors="*{stock}"></div>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-semibold">Stock mínimo</label>
                        <input type="number"
                               th:class="${#fields.hasErrors('stockMinimo')} ? 'form-control is-invalid' : 'form-control'"
                               th:field="*{stockMinimo}"/>
                        <div class="invalid-feedback" th:errors="*{stockMinimo}"></div>
                    </div>
                    <div class="col-md-4 mb-3">
                        <label class="form-label fw-semibold">Fecha de vencimiento</label>
                        <input type="date"
                               th:class="${#fields.hasErrors('fechaVencimiento')} ? 'form-control is-invalid' : 'form-control'"
                               th:field="*{fechaVencimiento}"/>
                        <div class="invalid-feedback" th:errors="*{fechaVencimiento}"></div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Categoría</label>
                        <select th:class="${#fields.hasErrors('categoria')} ? 'form-select is-invalid' : 'form-select'"
                                th:field="*{categoria.id}">
                            <option value="">-- Selecciona una categoría --</option>
                            <option th:each="cat : ${categorias}"
                                    th:value="${cat.id}"
                                    th:text="${cat.nombre}">
                            </option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{categoria}"></div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Proveedor</label>
                        <select th:class="${#fields.hasErrors('proveedor')} ? 'form-select is-invalid' : 'form-select'"
                                th:field="*{proveedor.id}">
                            <option value="">-- Selecciona un proveedor --</option>
                            <option th:each="prov : ${proveedores}"
                                    th:value="${prov.id}"
                                    th:text="${prov.nombre}">
                            </option>
                        </select>
                        <div class="invalid-feedback" th:errors="*{proveedor}"></div>
                    </div>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success"><i class="bi bi-check-lg"></i> Guardar</button>
                    <a href="/medicamentos" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Volver</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
