<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Proveedor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">FarmaSystem</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link text-white" href="/categorias">Categorías</a>
            <a class="nav-link text-white" href="/proveedores">Proveedores</a>
            <a class="nav-link text-white" href="/medicamentos">Medicamentos</a>
            <a class="nav-link text-white" href="/clientes">Clientes</a>
            <a class="nav-link text-white" href="/ventas">Ventas</a>
        </div>
    </div>
</nav>
<div class="container mt-4">
    <div class="card shadow-sm" style="max-width: 650px; margin: auto;">
        <div class="card-header bg-success text-white">
            <h5 class="mb-0"><i class="bi bi-truck"></i>
                <span th:text="${proveedor.id != null} ? 'Editar Proveedor' : 'Nuevo Proveedor'"></span>
            </h5>
        </div>
        <div class="card-body">
            <form th:action="@{/proveedores/guardar}" th:object="${proveedor}" method="post">
                <input type="hidden" th:field="*{id}"/>
                <div class="mb-3">
                    <label class="form-label fw-semibold">NIT</label>
                    <input type="text" th:class="${#fields.hasErrors('nit')} ? 'form-control is-invalid' : 'form-control'"
                           th:field="*{nit}" placeholder="Ej: 900123456-1"/>
                    <div class="invalid-feedback" th:errors="*{nit}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Nombre</label>
                    <input type="text" th:class="${#fields.hasErrors('nombre')} ? 'form-control is-invalid' : 'form-control'"
                           th:field="*{nombre}" placeholder="Nombre del proveedor"/>
                    <div class="invalid-feedback" th:errors="*{nombre}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Teléfono</label>
                    <input type="text" th:class="${#fields.hasErrors('telefono')} ? 'form-control is-invalid' : 'form-control'"
                           th:field="*{telefono}" placeholder="Ej: 3001234567"/>
                    <div class="invalid-feedback" th:errors="*{telefono}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Correo electrónico</label>
                    <input type="email" th:class="${#fields.hasErrors('correoElectronico')} ? 'form-control is-invalid' : 'form-control'"
                           th:field="*{correoElectronico}" placeholder="correo@ejemplo.com"/>
                    <div class="invalid-feedback" th:errors="*{correoElectronico}"></div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Dirección</label>
                    <input type="text" th:class="${#fields.hasErrors('direccion')} ? 'form-control is-invalid' : 'form-control'"
                           th:field="*{direccion}" placeholder="Dirección del proveedor"/>
                    <div class="invalid-feedback" th:errors="*{direccion}"></div>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success"><i class="bi bi-check-lg"></i> Guardar</button>
                    <a href="/proveedores" class="btn btn-secondary"><i class="bi bi-arrow-left"></i> Volver</a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
