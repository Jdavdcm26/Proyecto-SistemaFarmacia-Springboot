<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Categorías</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">FarmaSystem</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link text-white" href="/categorias">Categorías</a>
            <a class="nav-link text-white" href="/proveedores">Proveedores</a>
            <a class="nav-link text-white" href="/medicamentos">Medicamentos</a>
            <a class="nav-link text-white" href="/clientes">Clientes</a>
            <a class="nav-link text-white" href="/ventas">Ventas</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2><i class="bi bi-tags"></i> Categorías</h2>
        <a href="/categorias/nuevo" class="btn btn-success">
            <i class="bi bi-plus-lg"></i> Nueva Categoría
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-hover mb-0">
                <thead class="table-success">
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th>Medicamentos</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="categoria : ${categorias}">
                        <td th:text="${categoria.id}"></td>
                        <td th:text="${categoria.nombre}"></td>
                        <td th:text="${categoria.descripcion}"></td>
                        <td th:text="${categoria.medicamentos != null ? categoria.medicamentos.size() : 0}"></td>
                        <td>
                            <a th:href="@{/categorias/editar/{id}(id=${categoria.id})}"
                               class="btn btn-sm btn-outline-primary">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:href="@{/categorias/eliminar/{id}(id=${categoria.id})}"
                               class="btn btn-sm btn-outline-danger"
                               onclick="return confirm('¿Eliminar esta categoría?')">
                                <i class="bi bi-trash"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(categorias)}">
                        <td colspan="5" class="text-center text-muted">No hay categorías registradas</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

</body>
</html>
