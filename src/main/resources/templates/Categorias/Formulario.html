<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulario Categoría</title>
</head>

<body>

<h1>Registrar Categoría</h1>

<form th:action="@{/categorias/guardar}"
      th:object="${categoria}"
      method="post">

    <input type="hidden"
           th:field="*{id}">

    Nombre:

    <input type="text"
           th:field="*{nombre}"
           required>

    <br><br>

    <button type="submit">
        Guardar
    </button>

    <a th:href="@{/categorias}">
        Cancelar
    </a>

</form>

</body>
</html>
