<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Categoría</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-success">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">FarmaSystem</a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link text-white" href="/categorias">Categorías</a>
            <a class="nav-link text-white" href="/proveedores">Proveedores</a>
            <a class="nav-link text-white" href="/medicamentos">Medicamentos</a>
            <a class="nav-link text-white" href="/clientes">Clientes</a>
            <a class="nav-link text-white" href="/ventas">Ventas</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="card shadow-sm" style="max-width: 600px; margin: auto;">
        <div class="card-header bg-success text-white">
            <h5 class="mb-0">
                <i class="bi bi-tag"></i>
                <span th:text="${categoria.id != null} ? 'Editar Categoría' : 'Nueva Categoría'"></span>
            </h5>
        </div>
        <div class="card-body">
            <form th:action="@{/categorias/guardar}" th:object="${categoria}" method="post">
                <input type="hidden" th:field="*{id}"/>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Nombre</label>
                    <input type="text" class="form-control"
                           th:class="${#fields.hasErrors('nombre')} ? 'form-control is-invalid' : 'form-control'"
                           th:field="*{nombre}" placeholder="Ej: Analgésicos"/>
                    <div class="invalid-feedback" th:errors="*{nombre}"></div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Descripción</label>
                    <textarea class="form-control" th:field="*{descripcion}"
                              rows="3" placeholder="Descripción opcional"></textarea>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">
                        <i class="bi bi-check-lg"></i> Guardar
                    </button>
                    <a href="/categorias" class="btn btn-secondary">
                        <i class="bi bi-arrow-left"></i> Volver
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
