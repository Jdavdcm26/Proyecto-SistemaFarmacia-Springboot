<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lista de Categorías</title>
</head>

<body>

<h1>Lista de Categorías</h1>

<a th:href="@{/categorias/nuevo}">
    Nueva Categoría
</a>

<br><br>

<table border="1">

    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Acciones</th>
    </tr>

    <tr th:each="c : ${categorias}">

        <td th:text="${c.id}"></td>

        <td th:text="${c.nombre}"></td>

        <td>

            <a th:href="@{/categorias/editar/{id}(id=${c.id})}">
                Editar
            </a>

            |

            <a th:href="@{/categorias/eliminar/{id}(id=${c.id})}">
                Eliminar
            </a>

        </td>

    </tr>

</table>

</body>
</html>
